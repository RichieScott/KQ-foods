<body class="bg-background font-body text-on-background min-h-screen flex flex-col items-center justify-center p-4">
<!-- Suppressed TopAppBar for transactional focus, using simplified brand anchor -->
<header class="mb-12 text-center">
<h1 class="font-headline font-black text-4xl text-primary tracking-tighter">KQ Foods</h1>
<p class="font-body text-on-surface-variant mt-2 text-lg">Join the Digital Artisan community</p>
</header>
<main class="w-full max-w-[500px]">
<!-- Signup Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_32px_64px_rgba(45,47,47,0.06)] p-8 md:p-10 relative overflow-hidden">
<!-- Asymmetric Motif Decoration -->
<div class="absolute -top-12 -right-12 w-32 h-32 opacity-10 pointer-events-none">
<img class="w-full h-full object-cover rounded-full" data-alt="Traditional Nigerian woven textile pattern close-up" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2WY3Dla7F8Mb5Xpo5AufgNtlxVISIM98_pus9EvctMpTv14D68zKr_s-MggBhMFIAjW7sYn8jV25-EleLFnWmv0ixqc2LNrYJhwMarvWfyq4SwjoCtVOmZyRuSRHgzf6JO7MbE_Qkw_ZbvmPH_hv-nDxCl8P1M5SjqFuTldu7fwgmv6a4so87nJfqPDIXW1Kqy0jVo_nKt92Itw6xClBiRgKLdb-gKILgZI-JDqi3onuC-gP-65oPC9yRfootBPjvIgpXPK3YWJk"/>
</div>
<!-- Account Type Toggle -->
<div class="flex p-1.5 bg-surface-container-low rounded-full mb-8">
<button class="flex-1 py-3 px-6 rounded-full font-headline font-bold text-sm bg-primary text-on-primary shadow-sm transition-all duration-200">
                    Buyer
                </button>
<button class="flex-1 py-3 px-6 rounded-full font-headline font-bold text-sm text-on-surface-variant hover:bg-surface-container-high transition-all duration-200">
                    Seller
                </button>
</div>
<form class="space-y-6">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="block font-label text-[0.75rem] font-bold tracking-widest uppercase text-on-surface-variant ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder:text-outline" placeholder="Chidi Adebayo" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-[0.75rem] font-bold tracking-widest uppercase text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder:text-outline" placeholder="chidi@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label text-[0.75rem] font-bold tracking-widest uppercase text-on-surface-variant ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block font-label text-[0.75rem] font-bold tracking-widest uppercase text-on-surface-variant ml-1">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">verified_user</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms of Service -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded-lg border-outline-variant text-primary focus:ring-primary bg-surface-container-low transition-colors duration-200" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Action Button -->
<button class="w-full py-4 signature-gradient text-on-primary font-headline font-extrabold text-lg rounded-full shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-4" type="submit">
                    Create Account
                </button>
</form>
<!-- Login Link -->
<div class="mt-8 pt-8 border-t border-surface-container flex flex-col items-center gap-4">
<p class="text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Log In</a>
</p>
<div class="flex items-center gap-4 w-full px-4">
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
<span class="font-label text-[10px] uppercase tracking-widest text-outline">or sign up with</span>
<div class="h-[1px] flex-1 bg-surface-container-highest"></div>
</div>
<div class="flex gap-4 w-full">
<button class="flex-1 flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low rounded-xl hover:bg-surface-container-high transition-colors duration-200">
<img class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARyjlPIJxlQATAA_xMJd6JvWIdXBPUVyyL5afLwjsWPmnS7LrbqSVYZR0qcnzChX8d_lPxvMvwtfkURIfv-Q-RUPDgO6L29qAM4gFRAjZccOxTeb7yQAGqSKvL2hVPcE2YdHxEVIL3cMSMLlgtAhou8vhlLEPj_SwK8MGSQVT37UkQTnlvAe_kjZlVb9ruUzSZakLaJghoxO5XWY7pSthfw7bCzkIBb-09Aihi3ce8HYKDccUKKbJh-kaLEfTiwxKVIX8-ZsrghiE"/>
<span class="font-body font-semibold text-sm">Google</span>

<span class="font-body font-semibold text-sm">Apple</span>
</button>
</div>
</div>
</div>
</main>
<!-- Visual Anchor: Editorial Food Image (Floating) -->
<div class="fixed bottom-0 right-0 w-[400px] h-[400px] hidden lg:block opacity-40 pointer-events-none transform translate-x-20 translate-y-20">
<img class="w-full h-full object-contain filter drop-shadow-2xl" data-alt="Artistic overhead shot of a vibrant bowl of Jollof rice with fried plantains" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvjFiNLGcAeXLGZigCS3kCZd7zU_43otqHNCF0WrOf76XTv132owGvfNCxNI13pqdLXbmhMdxkoC5NdV7u_NB3qRB0fONJ2_l7m5GnKLvJIPYBGlKFts2HWgv2LwiyctA2ClzIvsxhLp_46BT8iyi7PprgH7_ZmugXLEOSZApU8_SsiS5UXIzncr_kEWxWH21TXp_8r2fgjZ9LVx89XvSfk7O2n0Fj3YhTP_61W2iiTTqE4VUeUjvQHXGW2aVJcOfGjBO4pOIFgo0"/>

<div class="fixed top-0 left-0 w-[300px] h-[300px] hidden lg:block opacity-20 pointer-events-none transform -translate-x-20 -translate-y-20">

</div>
<!-- Help Action -->
<footer class="mt-8 text-center pb-8">
<button class="flex items-center gap-2 mx-auto text-on-surface-variant font-label text-[10px] tracking-widest uppercase hover:text-primary transition-colors duration-200">
